spring.application.name=demo-project

server.port = 8081

#MySql database configuration for chatMemory
#spring.datasource.url=jdbc:mysql://localhost:3306/spring-ai
#spring.datasource.username=root
#spring.datasource.password=password
#spring.ai.chat.memory.repository.jdbc.initialize-schema=ALWAYS



#MariaDb database configuration for vectorDatabase
spring.datasource.url=jdbc:mariadb://localhost:3308/springai
spring.datasource.username=root
spring.datasource.password=password

# ── MariaDB Vector Store ───────────────────────────────────
spring.ai.vectorstore.mariadb.initialize-schema=true
spring.ai.vectorstore.mariadb.distance-type=COSINE
# gemini-embedding-001 outputs 3072 dimensions
spring.ai.vectorstore.mariadb.dimensions=3072


#Ollama base url
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=codellama:latest
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.embedding.enabled=false


# Groq via OpenAI-compatible endpoint
spring.ai.openai.api-key=${OPEN_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7

# ── Gemini for EMBEDDINGS (free) ───────────────────────────
gemini.api-key=${GEMINI_API_KEY}
spring.ai.google.gemini.embedding.options.model=text-embedding-004
spring.ai.openai.embedding.enabled=false


logging.level.root=INFO
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
